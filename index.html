<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>JSONP URL Generator</title>
<script src="https://app.managedmissions.com/scripts/jquery-3.5.1.min.js"></script>
</head>
<body>

<script>
var callback = "jQuery3510" + Math.floor(Math.random() * 999999999999999999) + "_" + Date.now();

var url = "https://example.com/test?callback=" + callback;

document.write("<h3>Callback:</h3>");
document.write("<pre>" + callback + "</pre>");

document.write("<h3>Full URL:</h3>");
document.write("<pre>" + url + "</pre>");
</script>

</body>
</html>
