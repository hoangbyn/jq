<!DOCTYPE html>
<html>
<head>
  <script src="https://app.managedmissions.com/scripts/jquery-3.5.1.min.js"></script>
</head>
<body>

<h3>Callback only:</h3>
<pre id="callback"></pre>

<h3>Full generated URL:</h3>
<pre id="url"></pre>

<script>
$(function () {
  $.ajax({
    url: "https://example.com/test",
    dataType: "jsonp",

    beforeSend: function (xhr, settings) {
      var fullUrl = settings.url;
      var match = fullUrl.match(/[?&]callback=([^&]+)/);

      document.getElementById("url").textContent = fullUrl;

      if (match) {
        document.getElementById("callback").textContent =
          decodeURIComponent(match[1]);
      }
    },

    error: function () {
      console.log("JSONP failed, but callback was generated.");
    }
  });
});
</script>

</body>
</html>
