<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>jQuery Callback Generator</title>

    <script src="https://app.managedmissions.com/scripts/jquery-3.5.1.min.js"></script>

    <style>
        body{
            font-family: Arial;
            padding:20px;
        }

        pre{
            background:#f5f5f5;
            padding:10px;
            border:1px solid #ddd;
            word-wrap:break-word;
        }

        button{
            padding:10px 20px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<h2>Generated jQuery Callback</h2>

<button onclick="generateCallback()">Generate</button>

<br><br>

<pre id="callback">Click Generate</pre>

<script>

function generateCallback()
{
    var callback =
        $.expando +
        "_" +
        Date.now();

    document.getElementById("callback").textContent = callback;
}

generateCallback();

</script>

</body>
</html>
