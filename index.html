<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>JSONP URL Generator</title>

    <script src="https://app.managedmissions.com/scripts/jquery-3.5.1.min.js"></script>
</head>
<body>

<pre id="result"></pre>

<script>

var callback =
    $.expando +
    "_" +
    Date.now();

var url =
    "https://example.com/test?callback=" +
    encodeURIComponent(callback);

document.getElementById("result").textContent = url;

</script>

</body>
</html>
