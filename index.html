<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>jQuery Callback Test</title>

    <script src="https://app.managedmissions.com/scripts/jquery-3.5.1.min.js"></script>
</head>
<body>

<h3>Generated Callback:</h3>
<pre id="result">Waiting...</pre>

<script>

(function() {

    var oldAjax = $.ajax;

    $.ajax = function(options) {

        if (options.dataType === "jsonp") {

            var oldBeforeSend = options.beforeSend;

            options.beforeSend = function(xhr, settings) {

                document.getElementById("result").innerText =
                    "Generated URL:\n\n" + settings.url;

                console.log(settings.url);

                if (oldBeforeSend) {
                    return oldBeforeSend(xhr, settings);
                }
            };
        }

        return oldAjax.apply(this, arguments);
    };

    $.ajax({
        url: "https://api.github.com/users/octocat?callback=?",
        dataType: "jsonp",
        success: function(data) {
            console.log(data);
        }
    });

})();
</script>

</body>
</html>
